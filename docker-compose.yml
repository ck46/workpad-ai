services:
  api:
    build:
      context: ./apps/api
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-5.4}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-medium}
      APP_DATABASE_URL: ${APP_DATABASE_URL:-sqlite:///./data/workpad.db}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://0.0.0.0:3000,http://host.docker.internal:3000}
    volumes:
      - ./apps/api/data:/app/data
    ports:
      - "8088:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"]
      interval: 10s
      timeout: 5s
      retries: 6

  web:
    build:
      context: ./apps/web
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8088}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
